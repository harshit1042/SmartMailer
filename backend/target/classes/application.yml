server:
  port: ${PORT:8080}

spring:
  application:
    name: smartmailer
  datasource:
    url: ${DB_URL:jdbc:h2:mem:smartmailer;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        auto-startup: ${RABBITMQ_LISTENER_ENABLED:false}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:false}

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-change-this-development-secret}
    expires-minutes: ${JWT_EXPIRES_MINUTES:1440}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  uploads:
    directory: ${UPLOAD_DIR:uploads}
  email:
    queue: smartmailer.email.jobs
    queue-enabled: ${EMAIL_QUEUE_ENABLED:false}
    from: ${MAIL_FROM:no-reply@smartmailer.local}
